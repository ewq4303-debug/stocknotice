name: TDCC Weekly Shareholding

on:
  schedule:
    # 台灣每週六 15:23 (UTC 07:23) - 避開整點/半點熱門時段
    # 集保 OpenData CSV 通常週六早上更新, 下午抓最穩
    - cron: '23 7 * * 6'
  workflow_dispatch:  # 也可以手動觸發

permissions:
  contents: write  # 允許 commit + push 歷史快照

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整 history, 才能 git push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run TDCC weekly snapshot
        run: python tdcc_weekly.py
        env:
          STOCKS: ${{ vars.STOCKS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
